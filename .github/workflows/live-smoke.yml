name: Live smoke check

on:
  schedule:
    - cron: "17 15 * * 1"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check the live model
        run: |
          health="$(curl --fail --retry 4 --retry-delay 15 --max-time 60 https://moviereccomendersystem-uxol.onrender.com/health)"
          echo "$health" | grep -q '"status":"ok"'
          echo "$health" | grep -q '"retrieval_ready":true'

      - name: Check the live site and stale wording
        run: |
          page="$(curl --fail --retry 3 --retry-delay 5 --max-time 30 https://movie-reccomender-system-red.vercel.app)"
          echo "$page" | grep -q "Find something worth watching"
          if echo "$page" | grep -Eq "Personalized Ranking Service|Run a ranking query|Top K"; then
            echo "Found stale product copy"
            exit 1
          fi
